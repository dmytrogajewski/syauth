# syauth — Release workflow.
#
# Roadmap item S-021. Builds the Fedora RPM, the Debian deb, and the
# signed Android APK on every `v*.*.*` tag, then attaches all three
# to the matching GitHub Release.
#
# Trigger: `push: tags: 'v*.*.*'`. Pushes to branches do NOT fire
# this workflow; the regular ci.yml handles those.
#
# Required secrets (configure in GitHub repo settings → Secrets):
#   - SYAUTH_RELEASE_KEYSTORE_BASE64    base64-encoded Android keystore (.jks)
#   - SYAUTH_RELEASE_KEYSTORE_PASSWORD  passphrase for the keystore
#   - GITHUB_TOKEN                       implicit; no PAT required
#
# Action pins:
#   - actions/checkout@v4               (stable major; widely used)
#   - dtolnay/rust-toolchain@stable     (matches ci.yml)
#   - Swatinem/rust-cache@v2            (matches ci.yml)
#   - android-actions/setup-android@v3  (official Android SDK setup)
#   - actions/setup-java@v4             (JDK 17 for Android build)
#   - actions/upload-artifact@v4        (current major)
#   - actions/download-artifact@v4      (matches upload-artifact major)
#   - softprops/action-gh-release@v1    (stable major; widely audited)

name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  PACKAGE_VERSION: "0.1.0"
  RPM_RELEASE: "1"
  DEB_REVISION: "1"

jobs:
  build-rpm:
    name: build (Fedora RPM)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mock + rpm-build tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            mock rpm rpmlint
          sudo usermod -a -G mock "$USER"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build source tarball
        run: make dist

      - name: Build RPM under mock
        run: make rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: syauth-rpm
          path: target/syauth-${{ env.PACKAGE_VERSION }}-${{ env.RPM_RELEASE }}.fc39.x86_64.rpm
          if-no-files-found: error

  build-deb:
    name: build (Debian deb)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pbuilder + debhelper tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pbuilder debhelper devscripts dpkg-dev lintian \
            libpam0g-dev libbluetooth-dev libsecret-1-dev libssl-dev pkg-config

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build source tarball
        run: make dist

      - name: Build deb under pbuilder
        run: make deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: syauth-deb
          path: target/syauth_${{ env.PACKAGE_VERSION }}-${{ env.DEB_REVISION }}_amd64.deb
          if-no-files-found: error

  build-apk:
    name: build (signed Android APK)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build syauth_mobile.aar
        run: make android-aar

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SYAUTH_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "::error::SYAUTH_RELEASE_KEYSTORE_BASE64 secret is not set; cannot sign release APK."
            exit 1
          fi
          mkdir -p "${RUNNER_TEMP}/keystore"
          printf '%s' "${KEYSTORE_BASE64}" | base64 -d > "${RUNNER_TEMP}/keystore/release.jks"
          echo "SYAUTH_RELEASE_KEYSTORE=${RUNNER_TEMP}/keystore/release.jks" >> "${GITHUB_ENV}"

      - name: Build and sign release APK
        env:
          SYAUTH_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.SYAUTH_RELEASE_KEYSTORE_PASSWORD }}
        run: make release-apk

      - name: Verify APK signature
        run: |
          apksigner verify --print-certs \
            "syauth-android/app/build/outputs/apk/release/syauth-${PACKAGE_VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: syauth-apk
          path: syauth-android/app/build/outputs/apk/release/syauth-${{ env.PACKAGE_VERSION }}.apk
          if-no-files-found: error

  publish-release:
    name: publish (attach artifacts to GH Release)
    needs: [build-rpm, build-deb, build-apk]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: syauth-rpm
          path: dist/

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: syauth-deb
          path: dist/

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: syauth-apk
          path: dist/

      - name: Compute release body
        id: relbody
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "body_path=CHANGELOG.md" >> "${GITHUB_OUTPUT}"
          else
            # Fall back to the threat-model sign-off paragraph from
            # docs/security.md (which mirrors the executive summary
            # from specs/threat/THREAT-2026-05-15.md).
            echo "body_path=docs/security.md" >> "${GITHUB_OUTPUT}"
          fi

      - name: Attach artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/syauth-${{ env.PACKAGE_VERSION }}-${{ env.RPM_RELEASE }}.fc39.x86_64.rpm
            dist/syauth_${{ env.PACKAGE_VERSION }}-${{ env.DEB_REVISION }}_amd64.deb
            dist/syauth-${{ env.PACKAGE_VERSION }}.apk
          body_path: ${{ steps.relbody.outputs.body_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

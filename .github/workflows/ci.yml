# syauth — Continuous Integration.
#
# Runs the same gates a developer runs locally:
#   - `make lint` (clippy --all-targets -D warnings, fmt --check,
#                  cargo deny check, scope-discipline grep).
#   - `make test` (workspace, all targets, all features).
#   - `make build` (release; verifies `libpam_syauth.so` ships).
#   - Android: `:app:assembleDebug` + `:app:testDebugUnitTest` so the
#              Compose app cannot drift from the Rust workspace.
#
# System libraries the bluer / libpam-sys / libbluetooth-sys build
# scripts consume are installed via apt on every job that touches
# them. cargo / gradle caches are warmed by Swatinem/rust-cache and
# the gradle/actions/setup-gradle@v3 cache.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"
  # CARGO_INCREMENTAL is disabled in CI by the rust-cache action and
  # explicitly here so a flaky cache eviction cannot leave incremental
  # state behind.
  CARGO_INCREMENTAL: "0"

jobs:
  lint:
    name: lint (clippy + fmt + deny + scope-discipline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev libpam0g-dev libbluetooth-dev \
            pkg-config

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: make lint
        run: make lint

  test:
    name: test (workspace)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev libpam0g-dev libbluetooth-dev \
            pkg-config

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: make test
        run: make test

  build:
    name: build (release workspace + cdylib)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev libpam0g-dev libbluetooth-dev \
            pkg-config

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: make build
        run: make build

      - name: Verify libpam_syauth.so exists
        run: test -f target/release/libpam_syauth.so

      - name: Verify syauth CLI exists
        run: test -x target/release/syauth

      - name: Verify syauth-presenced daemon exists
        run: test -x target/release/syauth-presenced

  # NOTE: the Android assembleDebug job depends on the Rust-built
  # `crates/syauth-mobile/target/syauth_mobile.aar` (UniFFI Kotlin
  # bindings + per-ABI `libsyauth_mobile.so`). Building that in CI
  # requires the NDK, the four Android rustc targets, and
  # `uniffi-bindgen-cli`, which is a substantial workstream of its
  # own. It is intentionally out of scope for this workflow; see the
  # `release.yml` workflow which already exercises the full Android
  # build (and is gated behind a release-keystore secret).
  #
  # The desktop-side `make lint / test / build` gates above are the
  # core of "is the workspace healthy" coverage; the Android side has
  # its own Robolectric unit-test layer that runs locally via
  # `./gradlew :app:testDebugUnitTest`.

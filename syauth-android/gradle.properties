# Roadmap item S-015 — mirrors `~/sources/prrr/prrr-android/gradle.properties`.
# The `org.gradle.java.home=` line from prrr-android is intentionally OMITTED:
# that line pins a host-specific JDK path which would break the build on every
# developer machine that installs the JDK at a different prefix. JVM 17+ is
# required (per AGP 8.2.x); the developer's `JAVA_HOME` decides the exact JDK.

# Kotlin
kotlin.code.style=official

# AndroidX
android.useAndroidX=true

# Jetpack Compose
android.defaults.buildfeatures.buildconfig=true

# Gradle daemon and memory
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
